<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>
<body>
  <div class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-logo">AI</div>
          <div class="brand-text">
            <h2>AI Assistant</h2>
            <p>Multi-Agent SDLC</p>
          </div>
        </div>

        <button id="newChatBtn" class="new-chat">
          <i class="fa-solid fa-plus"></i>
          <span>New Chat</span>
        </button>
      </div>

      <div class="sidebar-section">
        <span class="section-title">Chats</span>
        <div id="chatList" class="chat-list"></div>
      </div>
    </aside>

    <div id="sidebarBackdrop" class="sidebar-backdrop hidden"></div>

    <main class="main">
      <header class="topbar">
        <div class="top-left">
          <button id="sidebarToggle" class="icon-btn sidebar-toggle" type="button" aria-label="Toggle chat list">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="online-dot"></div>
          <span>AI Assistant</span>
        </div>
      </header>

      <section id="chatMessages" class="messages"></section>

      <section id="downloadArea" class="download-area"></section>

      <footer class="composer-area">
        <form id="chatForm" class="composer">
          <div id="attachmentPreview" class="attachment-row hidden"></div>
          <div id="uploadStatusLine" class="upload-status-line hidden"></div>
          <div class="composer-bottom">
            <div id="attachWrapper" class="attach-wrapper composer-icon">
              <button type="button" id="attachBtn" class="attach-btn" aria-label="Attach file">
                <i class="fa-solid fa-plus"></i>
              </button>
              <div id="attachMenu" class="attach-menu hidden">
                <button type="button" id="attachMenuUpload" class="attach-menu-item">
                  <span class="attach-menu-icon"><i class="fa-solid fa-file-arrow-up"></i></span>
                  <span class="attach-menu-text">
                    <strong>Choose file</strong>
                    <small>PDF, DOCX, TXT, CSV, XLSX, PPTX, JSON, MD, ZIP, images</small>
                  </span>
                </button>
              </div>
            </div>
            <input type="file" id="attachFileInput" accept="*/*" multiple hidden />
            <textarea
              id="messageInput"
              class="composer-input"
              rows="1"
              autocomplete="off"
              spellcheck="false"
              placeholder="Ask the AI anything..."
            ></textarea>
            <button type="submit" id="sendBtn" class="send-btn" aria-label="Send message">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </form>
      </footer>

      <div id="dropOverlay" class="drop-overlay hidden">
        <div class="drop-overlay-inner">
          <i class="fa-solid fa-cloud-arrow-up"></i>
          <span>Drop files here</span>
        </div>
      </div>
    </main>
  </div>

  <div id="kbModal" class="modal-overlay hidden">
    <div class="modal-panel agent-card-block">
      <div class="agent-card-header">
        <span>Knowledge Base</span>
        <button id="kbCloseBtn" class="modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div class="agent-card-body">
        <form id="kbUploadForm" class="kb-upload-row">
          <input type="file" id="kbFileInput" accept="*/*" />
          <button type="submit" class="download-btn">Upload</button>
        </form>
        <p id="kbUploadStatus" class="kb-status"></p>
        <div id="kbDocList" class="kb-doc-list"></div>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
